<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julianie Studio | Artisan Knitwear & Toys</title>
    <style>
        /* Общие стили в стиле дорогого минимализма */
        body {
            background-color: #121212;
            color: #e5e5e5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
        }

        header h1 {
            color: #d4af37;
            font-size: 2.5em;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin: 0 0 10px 0;
        }

        header p {
            font-style: italic;
            color: #a0a0a0;
            margin: 0;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Красивая сетка для товаров */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        /* Карточка товара */
        .product-card {
            background: #1a1a1a;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: rgba(212, 175, 55, 0.3);
        }

        /* Галерея изображений внутри карточки */
        .product-gallery {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .product-gallery img {
            width: 50%;
            height: 250px;
            object-fit: cover;
            border-radius: 6px;
        }

        .product-card h3 {
            color: #ffffff;
            font-size: 1.3em;
            margin: 10px 0 5px 0;
            letter-spacing: 0.05em;
        }

        .product-card .edition {
            color: #a0a0a0;
            font-size: 0.9em;
            margin: 0 0 10px 0;
        }

        .product-card .price {
            color: #d4af37;
            font-weight: bold;
            font-size: 1.2em;
            display: block;
            margin-bottom: 20px;
        }

        /* Идеальная, чистая кнопка заказа на почту */
        .order-button {
            display: block;
            width: 100%;
            box-sizing: border-box;
            background: #d4af37;
            color: #121212;
            text-decoration: none;
            padding: 12px;
            font-weight: bold;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.85em;
            transition: background 0.3s ease;
        }

        .order-button:hover {
            background: #f1c40f;
        }

        .note {
            text-align: center;
            margin-top: 40px;
            color: #888;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <header>
        <h1>Julianie Studio</h1>
        <p>Handcrafted Heirloom Companions & Luxury Knitwear</p>
    </header>

    <div class="container">
        <div class="products-grid">

            <div class="product-card">
                <div class="product-gallery">
                    <img src="bear1.png" alt="The Heritage Bear">
                    <img src="bear2.png" alt="The Heritage Bear">
                </div>
                <h3>The Heritage Bear</h3>
                <p class="edition">Lilac & Gold Edition</p>
                <span class="price">75€</span>
                <a href="mailto:julianochka.art@gmail.com?subject=Order Inquiry: The Heritage Bear" class="order-button">
                    Inquire via Email
                </a>
            </div>

            <div class="product-card">
                <div class="product-gallery">
                    <img src="bunny1.png" alt="The Heritage Bunny">
                    <img src="bunny2.png" alt="The Heritage Bunny">
                </div>
                <h3>The Heritage Bunny</h3>
                <p class="edition">Lilac & Lavender Edition</p>
                <span class="price">89€</span>
                <a href="mailto:julianochka.art@gmail.com?subject=Order Inquiry: The Heritage Bunny" class="order-button">
                    Inquire via Email
                </a>
            </div>

        </div>

        <p class="note">All items are lovingly handmade to order. Click a button to send a direct availability inquiry.</p>
    </div>

</body>
</html
